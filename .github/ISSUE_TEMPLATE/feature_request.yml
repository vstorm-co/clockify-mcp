name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in improving the Clockify MCP Server! Please describe your feature request below.

  - type: dropdown
    id: feature-category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - New MCP Tool (Clockify API integration)
        - Enhancement to Existing Tool
        - Performance Improvement
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm frustrated when... It would be helpful if..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you like to see this problem solved?
      placeholder: Describe your ideal solution

  - type: textarea
    id: tool-spec
    attributes:
      label: New Tool Specification (if applicable)
      description: If requesting a new MCP tool, describe its interface
      placeholder: |
        Tool name: getWorkspaceSettings
        Description: Retrieve workspace settings
        Parameters:
          - workspaceId (required)
        Returns: WorkspaceSettings object
      render: yaml

  - type: textarea
    id: clockify-api
    attributes:
      label: Clockify API Endpoint (if applicable)
      description: Link to the Clockify API documentation for this feature
      placeholder: "https://docs.developer.clockify.me/..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real-world scenario where this feature would be helpful
      placeholder: "As a freelancer, I need to..."

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
