name: Bug Report
description: Report a bug or issue with the Clockify MCP Server
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us diagnose the issue.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running the MCP server?
      options:
        - Claude Desktop (macOS)
        - Claude Desktop (Windows)
        - VSCode MCP Extension
        - MCP Inspector
        - Other (please specify in description)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of clockify-mcp are you using?
      placeholder: "e.g., 0.1.0"
    validations:
      required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure MCP server with...
        2. Call tool '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: tool-call
    attributes:
      label: Tool Call (if applicable)
      description: The specific MCP tool call that triggered the issue
      placeholder: |
        Tool name: createProject
        Parameters: { workspaceId: "...", name: "..." }
      render: json

  - type: textarea
    id: error-message
    attributes:
      label: Error Message
      description: Any error messages or logs
      render: shell

  - type: textarea
    id: config
    attributes:
      label: MCP Configuration
      description: Your MCP server configuration (remove API key!)
      placeholder: |
        {
          "mcpServers": {
            "clockify": {
              "command": "node",
              "args": ["..."],
              "env": {
                "CLOCKIFY_API_KEY": "REDACTED"
              }
            }
          }
        }
      render: json

  - type: dropdown
    id: api-working
    attributes:
      label: Does the Clockify API work directly?
      description: Can you successfully make the same API call using curl or Postman?
      options:
        - "Yes, API works directly"
        - "No, API also fails"
        - "Haven't tested"
        - "Not applicable"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem
